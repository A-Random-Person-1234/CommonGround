<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CommonGround</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app" id="appShell">
      <header class="topbar">
        <div class="brand-row">
          <div class="mark">CG</div>
          <div>
            <p class="eyebrow">CommonGround</p>
            <h1 id="pageTitle">Shared calendar</h1>
          </div>
        </div>

        <div class="actions">
          <span id="sourcePill" class="pill">Checking setup...</span>
          <div class="view-switcher" id="viewSwitcher" aria-label="Calendar view">
            <button type="button" data-view="day">D</button>
            <button type="button" data-view="week">W</button>
            <button type="button" data-view="month">M</button>
            <button type="button" data-view="year">Y</button>
          </div>
          <label class="theme-toggle" title="Toggle light and dark mode">
            <input type="checkbox" id="themeToggle" />
            <span>Light</span>
            <strong>Dark</strong>
          </label>
          <button class="secondary" id="refreshButton">Refresh</button>
          <button class="primary" id="connectButton">Connect Google</button>
        </div>
      </header>

      <section class="intro-card" id="introCard">
        <div>
          <p class="eyebrow">One shared board</p>
          <h2>Join the calendar to show your busy blocks.</h2>
          <p>
            CommonGround only reads busy/free availability from Google Calendar. It does not show event titles, descriptions, locations, or attendees.
          </p>
        </div>
        <button class="primary" id="heroConnectButton">Connect Google Calendar</button>
      </section>

      <section class="people-panel">
        <div>
          <p class="eyebrow">People connected</p>
          <h2 id="peopleCount">0 people</h2>
        </div>
        <div class="people-list" id="peopleList"></div>
      </section>

      <main class="calendar-wrap">
        <div class="calendar-grid" id="calendarGrid"></div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
