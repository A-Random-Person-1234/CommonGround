<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Google Calendar connection</title>
    <meta name="theme-color" content="#101c31" />
    <link rel="icon" type="image/png" href="/icons/CommonGroundAppIcon.png?v=20260724" />
    <link rel="apple-touch-icon" href="/icons/CommonGroundAppIcon.png?v=20260724" />
    <script src="/site-guard.js?v=20260724-contextmenu" defer></script>
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6f1e9;
        color: #34251b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid rgba(92, 65, 46, 0.2);
        border-radius: 18px;
        background: #fffaf3;
        box-shadow: 0 18px 48px rgba(57, 38, 25, 0.14);
        text-align: center;
      }
      .mark {
        width: 46px;
        height: 46px;
        margin: 0 auto 16px;
        display: block;
        border-radius: 14px;
        object-fit: cover;
        overflow: hidden;
        box-shadow: 0 10px 22px rgba(16, 28, 49, 0.2);
      }
      h1 { margin: 0; font-size: 22px; line-height: 1.2; }
      p { margin: 12px 0 0; color: #725b4b; line-height: 1.5; }
      button {
        min-height: 44px;
        margin-top: 20px;
        padding: 0 18px;
        border: 0;
        border-radius: 12px;
        background: #8a5a35;
        color: #fffaf3;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }
      button[hidden] { display: none; }
      button:focus-visible { outline: 3px solid rgba(138, 90, 53, 0.35); outline-offset: 3px; }
    </style>
    <script src="/oauth-popup.js?v=20260718-modal" defer></script>
  </head>
  <body>
    <main>
      <img class="mark" src="/icons/CommonGroundAppIcon.png" alt="" width="46" height="46" />
      <h1>Finishing your connection</h1>
      <p id="oauthPopupStatus" role="status" aria-live="polite">Confirming Google Calendar access...</p>
      <button id="oauthPopupClose" type="button" hidden>Close this window</button>
    </main>
  </body>
</html>
